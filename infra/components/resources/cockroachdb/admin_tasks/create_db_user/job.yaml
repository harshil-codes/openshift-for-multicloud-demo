apiVersion: batch/v1
kind: Job
metadata:
  name: crdb-create-user
  namespace: change-me
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - image: cockroachdb/cockroach:v25.3.4
          name: do-it
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
          command:
            - sh
            - -c
            - |-
              host=$(echo "$DB_HOST" | tr -d '\n')
              port=$(echo "$DB_PORT" | tr -d '\n')
              user=$(echo "$DB_USERNAME" | tr -d '\n')
              password=$(echo "$DB_PASSWORD" | tr -d '\n')
              ./cockroach sql --insecure \
                --host "$host" \
                --port "$port" \
                -e "SHOW USER;" | grep -q "$user"  && exit 0;
                ./cockroach sql --insecure \
                  --host "$host" \
                  --port "$port" \
                  -e "CREATE USER $user WITH PASSWORD '$password';"
