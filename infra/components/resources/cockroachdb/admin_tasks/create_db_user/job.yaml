apiVersion: batch/v1
kind: Job
metadata:
  name: crdb-create-user
  namespace: change-me
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - image: cockroachdb/cockroach:v25.3.4
          name: do-it
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
          command:
            - ./cockroach
            - sql
            - --host
            - "$(DB_HOST)"
            - --port
            - "$(DB_PORT)"
            - -e
            - "CREATE USER $(DB_USER) WITH PASSWORD $(DB_PASSWORD);"
