apiVersion: batch/v1
kind: Job
metadata:
  name: crdb-create-table
  namespace: change-me
spec:
  template:
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: certs
          projected:
            sources:
            - secret:
                items:
                - key: ca.crt
                  path: ca.crt
                - key: tls.crt
                  path: node.crt
                - key: tls.key
                  path: node.key
                name: crdb-cluster-node
            - secret:
                items:
                - key: tls.crt
                  path: client.root.crt
                - key: tls.key
                  path: client.root.key
                name: crdb-cluster-root
      containers:
        - image: cockroachdb/cockroach:v25.3.4
          name: do-it
          volumeMounts:
            - name: certs
              mountPath: /certs
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: port
            - name: DB_TABLE_NAME
              valueFrom:
                configMapKeyRef:
                  name: db-table-creation-settings
                  key: DB_TABLE_NAME
            - name: DB_TABLE_COLUMNS
              valueFrom:
                configMapKeyRef:
                  name: db-table-creation-settings
                  key: DB_TABLE_COLUMNS
          command:
            - sh
            - -c
            - |-
              ./cockroach sql \
                --host "$DB_HOST" \
                --port "$DB_PORT" \
                --certs-dir /certs \
                -e "CREATE TABLE IF NOT EXISTS $DB_TABLE_NAME ($DB_TABLE_COLUMNS)"
