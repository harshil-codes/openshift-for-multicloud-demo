apiVersion: batch/v1
kind: Job
metadata:
  name: crdb-create-database
  namespace: change-me
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - image: cockroachdb/cockroach:v25.3.4
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
          name: do-it
          command:
            - sh
            - -c
            - |-
              env | grep -i DB_
              ./cockroach sql --insecure \
                --host "$(DB_HOST)" \
                --port "$(DB_PORT)" \
                -e "CREATE DATABASE IF NOT EXISTS $(DB_NAME);"
