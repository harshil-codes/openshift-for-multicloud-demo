apiVersion: batch/v1
kind: Job
metadata:
  name: crdb-create-database
  namespace: change-me
spec:
  template:
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: certs
          projected:
            sources:
            - secret:
                items:
                - key: ca.crt
                  path: ca.crt
                - key: tls.crt
                  path: node.crt
                - key: tls.key
                  path: node.key
                name: crdb-cluster-node
            - secret:
                items:
                - key: tls.crt
                  path: client.root.crt
                - key: tls.key
                  path: client.root.key
                name: crdb-cluster-root
      containers:
        - image: cockroachdb/cockroach:v25.3.4
          volumeMounts:
            - name: certs
              mountPath: /certs
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
          name: do-it
          command:
            - sh
            - -c
            - |-
              host=$(echo "$DB_HOST" | tr -d '\n')
              port=$(echo "$DB_PORT" | tr -d '\n')
              dbname=$(echo "$DB_NAME" | tr -d '\n')
              ./cockroach sql --insecure \
                --host "$host" \
                --port "$port" \
                --certs-dir /certs \
                -e "CREATE DATABASE IF NOT EXISTS $dbname;"
