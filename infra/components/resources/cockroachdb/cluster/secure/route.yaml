apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cockroachdb
  namespace: cockroachdb
  labels:
    app.kubernetes.io/name: cockroachdb
spec:
  port:
    targetPort: https
  to:
    kind: Service
    name: crdb-cluster-public
    weight: 100
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge

