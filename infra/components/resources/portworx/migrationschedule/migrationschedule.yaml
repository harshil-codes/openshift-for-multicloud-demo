---
apiVersion: stork.libopenstorage.org/v1alpha1
kind: MigrationSchedule
metadata:
  name: change-me
  namespace: portworx
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedulePolicyName: px-schedule-policy
  suspend: false
  autoSuspend: true
  template:
    spec:
      clusterPair: cluster-pair
      includeResources: true
      startApplications: false
      includeVolumes: true
      excludeResourceTypes:
        - ClusterServiceVersion
        - operatorconditions
        - OperatorGroup
        - InstallPlan
        - Subscription
      namespaces:
      - change-me
