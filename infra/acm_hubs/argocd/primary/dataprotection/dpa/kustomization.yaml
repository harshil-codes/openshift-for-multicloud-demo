apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../../infra/components/resources/dataprotection
patches:
  - target:
      kind: DataProtectionApplication
      name: replace-me
      namespace: open-cluster-management-backup
    patch: |-
      - op: replace
        path: /metadata/name
        value: dpa-aws
      - op: replace
        path: /spec/backupLocations/0/velero/config/region
        value: us-east-2
      - op: replace
        path: /spec/backupLocations/0/velero/config/bucket
        value: l6w3wj0nbkcj-acm-hub-backups
      - op: replace
        path: /spec/backupLocations/0/velero/objectStorage/bucket
        value: l6w3wj0nbkcj-acm-hub-backups
      - op: replace
        path: /spec/snapshotLocations/0/velero/config/region
        value: us-east-2
