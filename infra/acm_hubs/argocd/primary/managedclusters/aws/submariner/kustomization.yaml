apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../../../infra/components/resources/submariner/addon
patches:
  - target:
      kind: ManagedClusterAddOn
      namespace: namespace
      name: submariner
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: managed-cluster-aws
  - target:
      kind: SubmarinerConfig
      namespace: namespace
      name: submariner
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: managed-cluster-aws
      - op: replace
        path: /spec/gatewayConfig
        value:
          gateways: 1
          aws:
            instanceType: m6i.xlarge

