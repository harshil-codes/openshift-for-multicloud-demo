apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../../../../../infra/components/resources/argocd/appset
patches:
  - target:
      kind: ApplicationSet
      name: replace-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: managed-cluster-aws-infra-migrationschedule
      - op: replace
        path: /spec/template/metadata/name
        value: managed-cluster-aws-infra-migrationschedule
      - op: replace
        path: /spec/generators/0/clusterDecisionResource/labelSelector/matchLabels/cluster.open-cluster-management.io~1placement
        value: aws-gitops-placement
      - op: replace
        path: /spec/template/spec/source
        value:
          repoURL: git@github.com:harshil-codes/openshift-for-multicloud-demo.git
          targetRevision: main
          path: ./infra/clusters/aws/infra/resources/migrationschedule
      - op: replace
        path: /spec/template/spec/destination/namespace
        value: managed-cluster-aws
      - op: replace
        path: /spec/template/spec/syncPolicy/syncOptions
        value:
          - CreateNamespace=true
          - Validate=false
  - target:
      kind: ApplicationSet
      name: replace-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: managed-cluster-aws-infra-sc
      - op: replace
        path: /spec/template/metadata/name
        value: managed-cluster-aws-infra-sc
      - op: replace
        path: /spec/generators/0/clusterDecisionResource/labelSelector/matchLabels/cluster.open-cluster-management.io~1placement
        value: aws-gitops-placement
      - op: replace
        path: /spec/template/spec/source
        value:
          repoURL: git@github.com:harshil-codes/openshift-for-multicloud-demo.git
          targetRevision: main
          path: ./infra/clusters/aws/infra/resources/storagecluster
      - op: replace
        path: /spec/template/spec/destination/namespace
        value: managed-cluster-aws
      - op: replace
        path: /spec/template/spec/syncPolicy/syncOptions
        value:
          - CreateNamespace=true
          - Validate=false
