apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../../../infra/components/managedclusters/gcp
patches:
  - target:
      kind: Namespace
      name: replace-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: managed-cluster-gcp
  - target:
      kind: ManagedCluster
      name: replace-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: managed-cluster-gcp
  - target:
      kind: MachinePool
      name: replace-me-worker
      namespace: replace-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: managed-cluster-gcp-worker
      - op: replace
        path: /metadata/namespace
        value: managed-cluster-gcp
      - op: replace
        path: /spec/clusterDeploymentRef/name
        value: managed-cluster-gcp
  - target:
      kind: KlusterletAddonConfig
      name: replace-me
      namespace: replace-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: managed-cluster-gcp
      - op: replace
        path: /metadata/namespace
        value: managed-cluster-gcp
      - op: replace
        path: /spec/clusterName
        value: managed-cluster-gcp
  - target:
      kind: ClusterDeployment
      name: replace-me
      namespace: replace-me
    patch: |-
      - op: replace
        path: /spec/baseDomain
        value: lprkd.gcp.redhatworkshops.io
      - op: replace
        path: /metadata/name
        value: managed-cluster-gcp
      - op: replace
        path: /metadata/namespace
        value: managed-cluster-gcp
      - op: replace
        path: /spec/clusterName
        value: managed-cluster-gcp
      - op: replace
        path: /metadata/labels/region
        value: us-east1
      - op: replace
        path: /spec/platform/gcp/region
        value: us-east1
      - op: replace
        path: /spec/provisioning/imageSetRef/name
        value: img4.18.26-multi-appsub
      - op: replace
        path: /spec/provisioning/sshPrivateKeySecretRef/name
        value: cluster-ssh-key
      - op: replace
        path: /spec/pullSecretRef/name
        value: ocp-pull-secret
