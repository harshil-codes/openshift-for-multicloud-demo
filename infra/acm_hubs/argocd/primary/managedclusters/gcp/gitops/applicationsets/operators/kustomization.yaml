apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../../../../../infra/components/resources/argocd/appset
patches:
    - target:
        kind: ApplicationSet
        name: replace-me
      patch: |-
        - op: replace
          path: /metadata/name
          value: managed-cluster-gcp-resources
        - op: replace
          path: /spec/template/metadata/annotations/apps.open-cluster-management.io~1ocm-managed-cluster
          value: managed-cluster-gcp
        - op: replace
          path: /spec/template/metadata/name
          value: managed-cluster-gcp-resources
        - op: replace
          path: /spec/template/spec/source
          value:
            repoURL: git@github.com:harshil-codes/openshift-for-multicloud-demo.git
            targetRevision: main
            path: ./infra/clusters/gcp/infra/operators
        - op: replace
          path: /spec/generators/0/clusterDecisionResource/labelSelector/matchLabels/cluster.open-cluster-management.io~1placement
          value: gcp-gitops-placement
        - op: replace
          path: /spec/template/spec/destination/namespace
          value: managed-cluster-gcp
        - op: add
          path: /spec/template/spec/syncPolicy/syncOptions/-
          value: SkipDryRunOnMissingResource=true
