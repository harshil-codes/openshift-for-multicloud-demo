common:
    bootstrap:
        # commmon.bootstrap: The GitOps tool used to bootstrap ACM and managed clusters.
        # Must be 'flux' or 'argocd'
        bootstrapper: argocd
    dns:
        settings:
            # dns.settings.domain_name: The domain name to access managed clusters and our demo app
            # from.
            domain_name: sandbox1361.opentlc.com
            # dns.settings.provider: The DNS provider used to write DNS records for our app.
            # Must be 'aws'.
            provider: aws
            # dns.settings.credentials: Credentials for the provider defined by
            # 'common.dns.settings.provider'.
            # encrypted
            credentials:
                access_key_id: ENC[AES256_GCM,data:yY4nFwAspFbHHNqQuaRS1VnmywY=,iv:xnHD5Cq4nVFRuKBUiSeu9mPaQXqwlQY/XVs7TLB+skY=,tag:sFuwpJXQdcaKJM/W3kziOQ==,type:str]
                secret_access_key: ENC[AES256_GCM,data:nmhYnx/t8rVCfYgev55IWF2e2Rk0nzI8T46jaZVLedUBs1VjH55ldg==,iv:+l72JdBu4pAbwFw8jQ8qmSTg+N7MKr2TaIfwT4m/t44=,tag:bk69Wyelp12NDMTtrLQv8Q==,type:str]
