    database:
        settings:
            # common.database.settings.provider: The name of the database being used for our example
            # app.
            provider: cockroachdb
            credentials:
                # common.database.settings.credentials.username: The username of the user to create
                # for the database. See the 'resources/cockroach/admin_taskscreate-db-user'
                # component to learn how this is done.
                # encrypted
                username: ENC[AES256_GCM,data:770VtnNKLjHkjA==,iv:3tTwu+ML9BlfmDyBtrfSdOzlgPx5krkdhCsMFLLUMJA=,tag:p1Sg4UqmiWjcAn0uvjE4Lg==,type:str]
                # common.database.settings.credentials.password: The username of the user to create
                # for the database. See the 'resources/cockroach/admin_taskscreate-db-user'
                # component to learn how this is done.
                # encrypted
                password: ENC[AES256_GCM,data:Rh25DmGOd3HPmg==,iv:mkx/AJb/PeMIuOYmjwFy/htGI82OD0EDWq5NSTemY1U=,tag:PwNOhxdjwbR8Oc4STpVvkg==,type:str]
                # common.database.settings.credentials.database: The username of the user to create
                # for the database. See the 'resources/cockroach/admin_taskscreate-db-user'
                # component to learn how this is done.
                # encrypted
                database: ENC[AES256_GCM,data:rTiHE5MoNH6CfQ==,iv:5Xxz9r1xy20/S/VVZXEVSGRis+DtwOCesBQXGaA9eAs=,tag:uKKkBF3CwfPLY/p6afuQQw==,type:str]
            network:
                ports:
                    # common.database.settings.network.ports.tcp: TCP ports to open between kubelets
                    # for database traffic.
                    tcp:
                        - 8080
                        - 26257
                        - 26258
                    # common.database.settings.network.ports.udp: UDP ports to open between kubelets
                    # for database traffic.
                    udp: []
    datareplication:
        settings:
            # common.datareplication.settings.provider: The name of the provider for replicated
            # storage between clusters.
            # Must be 'portworx'.
            provider: portworx
            credentials:
                # common.datareplication.settings.credentials.license_key: The license key for
                # the datareplication provider.
                # encrypted
                license_key: ENC[AES256_GCM,data:,iv:YA7lhbhl8eY1u9G9oPZKC7J9pHemYJzjKalzEu17hIQ=,tag:DCjCD9C7KS1RrbIvU+Y8Bg==,type:str]
            network:
                ports:
                    # common.datareplication.settings.network.ports.tcp: TCP ports to open
                    # for storage provider traffic between kubelets.
                    # https://docs.portworx.com/portworx-backup-on-prem/install/install-prereq/nw-prereqs
                    tcp:
                        - 2379
                        - 9001-9004
                        - 9009-9011
                        - 9015-9016
                        - 9018-9019
                        - 9021-9022
                        - 9024
                        - 9029
                        - 12001
                        - 12002
                        - 17001-17004
                        - 17009-17011
                        - 17015-17016
                        - 17018-17019
                        - 17021
                        - 20002
                    # common.datareplication.settings.network.ports.udp: UDP ports to open
                    # for storage provider traffic between kubelets.
                    # https://docs.portworx.com/portworx-backup-on-prem/install/install-prereq/nw-prereqs
                    udp:
                        - 9002
            # common.datareplication.settings.object_store: Settings for the object
            # store that will hold the bucket that Portworx Enterprise will use to
            # sync Portworx-managed volumes between clusters.
            #
            # In this demo, we assume that this will live in AWS S3. However, you can
            # set this to a third-party S3 storage provider, like Cloudflare R2, to
            # further decouple your infrastructure from the major hyperscalers.
            object_store:
                # common.datareplication.settings.object_store.endpoint_url:
                # Endpoint URL for the S3 service that Portworx Enterprise will use to
                # sync objects between clusters.
                endpoint_url: s3.amazonaws.com
                # common.datareplication.settings.object_store.access_key_id
                # Access key ID for the S3 service that Portworx Enterprise will use to
                # sync objects between clusters.
                # encrypted
                access_key_id: ENC[AES256_GCM,data:X+EJ2nXWOBmA0Ygue7qZtbnHDcY=,iv:OJBiHUp2NMao647hjJhU5RZAZv3yh6NakR9dBGmj/t8=,tag:NCAL+oZZazfiLtRGwo+G+g==,type:str]
                # common.datareplication.settings.object_store.access_key_id
                # Secret access key for the S3 service that Portworx Enterprise will use to
                # sync objects between clusters.
                # encrypted
                secret_access_key: ENC[AES256_GCM,data:4DWd3BeSKvR4pJxHnIYGmhRLLOUj2vS+6WbHAqZpIAMNkYcC0zd1UQ==,iv:M2GouXLOq+WvdsYfsI1FqqDBykhu++f4cinO8Z/SAg4=,tag:wIQweY5a+kpvXbWUoyOIvA==,type:str]
                # common.datareplication.settings.object_store.access_key_id
                # Region for the S3 service that Portworx Enterprise will use to sync objects
                # between clusters.
                region: us-east-2
    dataprotection:
        settings:
            # common.datareplication.settings.aws: Settings for the object
            # store that will hold the bucket that OADP will use to
            # backup your primary ACM hub. These backups will be restored
            # into the backup ACM hub when you simulate a regional outage.
            #
            # In this demo, we assume that this will live in AWS S3. However, you can
            # set this to a third-party S3 storage provider, like Cloudflare R2, to
            # further decouple your infrastructure from the major hyperscalers.
            aws:
                # common.dataprotection.settings.aws.region: The region where the bucket for the
                # backups taken by OADP in the ACM hub will live.
                region: us-east-2
                # common.dataprotection.settings.aws.region: The credentials filebucket for the
                # backups taken by OADP in the ACM hub will live.
                # encrypted
                credentials_file: ENC[AES256_GCM,data:UpEnin6aNyAtfDhzX6An2n80MOslcbK8Y9XKPrsCJ/hFwHEZ7s2b70HFMxy1DNrEtGJSOeXBW38G4cfgsuUtd8eotrsq6yHf5KRNG2cLdq+D+AuT3Gt3A1msymHIUYWyDF2YfxpD8i+BiRQXZBD4EeSmHw==,iv:dIOEsjgFCj9I8piS8D2E9+Y8C9/jO+gAMCpu/BjTUB0=,tag:HIQ5NyLNe4u1c6Zh1Puyaw==,type:str]
    gitops:
