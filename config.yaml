                cluster_gpg_key: ENC[AES256_GCM,data:,iv:HtRBLC1zO95fytDiCUBGgkk7puKxWLXeGLKVNQr38Q4=,tag:SlAbMlIWpbzlA5+Utik1MA==,type:str]
