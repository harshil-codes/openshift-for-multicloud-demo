common:
    bootstrap:
        # commmon.bootstrap: The GitOps tool used to bootstrap ACM and managed clusters.
        # Must be 'flux' or 'argocd'
        bootstrapper: argocd
    dns:
        settings:
            # dns.settings.domain_name: The domain name to access managed clusters and our demo app
            # from.
            domain_name: sandbox807.opentlc.com
            # dns.settings.provider: The DNS provider used to write DNS records for our app.
            # Must be 'aws'.
            provider: aws
            # dns.settings.credentials: Credentials for the provider defined by
            # 'common.dns.settings.provider'.
            # encrypted
            credentials:
                access_key_id: ENC[AES256_GCM,data:jEBPAgZlsyVnl3gVDzPpgrGie5s=,iv:agPpChNfnL83CyWzMaLbxo6dOB5o/ncpmN5kdbo8BoE=,tag:rSNTwfFSVn1TBx8l0U3huQ==,type:str]
                secret_access_key: ENC[AES256_GCM,data:b7H2YyA2y0EbIgz1ra2j+U8+YJ4lg76d0lkOAQnsAWN9Xicbw0m8wg==,iv:SzgHoCrgnLPLz6Lz5NLeYIAakfcZfkvdt8wI+Ru8oeQ=,tag:wVWo90+eNdoBJFSmKVNo2w==,type:str]
