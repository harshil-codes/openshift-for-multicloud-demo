            location:
                url: git@github.com:harshil-codes/openshift-for-multicloud-demo.git
                # this can also be a commit SHA.
                ref: main
                path: ./infra/acm_hubs
            credentials:
                # this should be a read-only token.
                ssh:
                    # common.gitops.repo.settings.credentials.ssh.public: Public key to use for
                    # cloning the repo specified in common.gitops.repo.settings.location.url.
                    # (See README to generate this.)
                    public: ssh-rsa  hsabhnan@hsabhnan-mac
