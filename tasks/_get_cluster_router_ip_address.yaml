---
- name: "[{{ item.cloud }}] Get cluster IP address"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ item.kubeconfig }}"
    kind: Service
    namespace: openshift-ingress
    name: router-default
  register: result

- set_fact:
    "{{ item.cloud }}_cluster_router_ip_address": "{{ result.resources[0].status.loadBalancer.ingress[0].ip }}"
  when: result.resources[0].status.loadBalancer.ingress[0].ip is defined

- set_fact: 
    "{{ item.cloud }}_cluster_router_ip_address": "{{ lookup('community.general.dig', result.resources[0].status.loadBalancer.ingress[0].hostname) | split(',') | first }}"
  when: result.resources[0].status.loadBalancer.ingress[0].hostname is defined

