---
# kubernetes.core.k8s_info asterisks out the domain name for some reason.
- name: "[{{ item.cloud }}] Get cluster hostname"
  shell: kubectl --kubeconfig <(echo "{{ item.kubeconfig }}") get ingresses.config cluster -o yaml
  register: data

- set_fact:
    "{{ item.cloud }}_cluster_hostname": "{{ (data.stdout | from_yaml).spec.domain }}"

