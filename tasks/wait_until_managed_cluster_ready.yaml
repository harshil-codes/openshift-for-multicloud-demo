---
- set_fact:
    managed_cluster_name: 'managed-cluster-{{ cloud }}'

- name: "Wait for '{{ managed_cluster_name }}' to become ready in ACM hub '{{ acm_hub_env.name }}'"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ acm_hub_env.cluster.kubeconfig }}"
    kind: ClusterDeployment
    name: "{{ managed_cluster_name }}"
    namespace: "{{ managed_cluster_name }}"
    wait: yes
    wait_sleep: 1
    wait_timeout: "{{ wait_timeout_secs | default(3600) }}"
    wait_condition:
      type: Ready
      reason: Running
      status: "True"
  register: result

- set_fact:
    "managed_cluster_{{ cloud }}_ready": true
  when: result.resources | length > 0
